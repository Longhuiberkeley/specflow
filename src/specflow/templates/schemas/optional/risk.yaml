type: risk
prefix: RISK
id_format: "RISK-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [priority, tags, suspect, fingerprint, links, modified, severity, probability, impact, risk_level, category]
allowed_status:
  draft: []
  approved: [draft]
  implemented: [approved]
  verified: [implemented]
allowed_link_roles: [derives_from, refined_by, verified_by, complies_with, mitigated_by, addresses]
directory: _specflow/specs/risks/
