type: control
prefix: CTRL
id_format: "CTRL-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [priority, tags, suspect, fingerprint, links, modified, control_type, effectiveness, category]
allowed_status:
  draft: []
  approved: [draft]
  implemented: [approved]
  verified: [implemented]
allowed_link_roles: [derives_from, refined_by, verified_by, complies_with, addresses, mitigated_by]
directory: _specflow/specs/controls/
