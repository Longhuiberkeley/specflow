type: detailed-design
prefix: DDD
id_format: "DDD-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [priority, version, rationale, tags, suspect, fingerprint, links, upstream, checklists_applied, modified]
allowed_status:
  draft: []
  approved: [draft]
  implemented: [approved]
  verified: [implemented]
allowed_link_roles: [refined_by, verified_by, derives_from, specified_by, complies_with]
directory: _specflow/specs/detailed-design/
