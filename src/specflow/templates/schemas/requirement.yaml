type: requirement
prefix: REQ
id_format: "REQ-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [priority, version, rationale, tags, suspect, fingerprint, links, upstream, checklists_applied, modified, non_functional_category, reqif_metadata]
allowed_status:
  draft: []
  approved: [draft]
  implemented: [approved]
  verified: [implemented]
allowed_link_roles: [refined_by, verified_by, derives_from, complies_with, validated_by]
directory: _specflow/specs/requirements/
