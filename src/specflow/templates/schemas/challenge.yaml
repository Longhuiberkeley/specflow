type: challenge
prefix: CHL
id_format: "CHL-\\d{3,4}$"
required_fields: [id, title, type, status, created, severity, technique]
optional_fields: [review_status, rationale, tags, links, modified]
allowed_status:
  open: []
  addressed: [open, stale]
  accepted: [open, addressed, stale]
  stale: [open, addressed, accepted]
allowed_review_status: [unreviewed, reviewed, flagged, addressed, accepted, stale]
allowed_link_roles: [challenges, refers_to]
directory: _specflow/specs/challenges/