# SpecFlow Platform Registry
#
# Each platform entry defines:
#   name:           Display name shown to users
#   preferred:      Whether shown as a recommended option on install
#   skills_dir:     Where to copy SpecFlow skill directories
#   detection:      Directory/file markers used to auto-detect this platform
#   legacy_dirs:    (optional) Old directories to clean up on reinstall
#
# Instruction file injection (AGENTS.md, CLAUDE.md, .cursor/rules/, etc.)
# is handled by the /specflow-init skill, not the CLI. The skill reads
# the agent-context.md template and writes it to the appropriate location
# for the detected platform.

platforms:

  claude-code:
    name: "Claude Code"
    preferred: true
    skills_dir: .claude/skills
    detection:
      - .claude/
    legacy_dirs:
      - .claude/commands

  cursor:
    name: "Cursor"
    preferred: true
    skills_dir: .cursor/skills
    detection:
      - .cursor/
    legacy_dirs:
      - .cursor/commands

  windsurf:
    name: "Windsurf"
    preferred: false
    skills_dir: .windsurf/skills
    detection:
      - .windsurf/
    legacy_dirs:
      - .windsurf/workflows

  cline:
    name: "Cline"
    preferred: false
    skills_dir: .cline/skills
