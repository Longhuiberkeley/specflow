# SpecFlow adapter configuration
# Generated by `specflow init`. Edit to customize providers.
# See docs/authoring-an-adapter.md for details.

ci:
  provider: github-actions           # CI provider to use
  operations:                        # operations to generate workflows for
    - artifact-lint
    - change-impact
    - project-audit
  release_gate:
    severity: error                  # block release if findings ≥ this severity

exchange:
  - name: reqif
    provider: reqif                  # built-in ReqIF exchange adapter
    direction: bidirectional

standards: []
  # Add standards sources here. Example:
  # - name: my-iso26262
  #   source: ./my-annotated-26262.pdf
  #   provider: pdf
