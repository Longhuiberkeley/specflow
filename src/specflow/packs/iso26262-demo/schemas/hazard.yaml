type: hazard
prefix: HAZ
id_format: "^HAZ-\\d{3}(\\.\\d{1,3})?$"
required_fields:
  - id
  - title
  - type
  - status
  - created
optional_fields:
  - priority
  - version
  - rationale
  - tags
  - suspect
  - fingerprint
  - links
  - modified
  - severity
  - controllability
  - exposure
  - asil_level
allowed_status:
  draft: []
  approved:
    - draft
  mitigated:
    - approved
allowed_link_roles:
  - refined_by
  - derives_from
  - complies_with
  - verified_by
directory: _specflow/specs/hazards/
