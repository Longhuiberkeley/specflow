type: defect
prefix: DEF
id_format: "DEF-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [priority, version, rationale, tags, suspect, fingerprint, links, upstream, checklists_applied, modified, severity, environment, reproduction_steps]
allowed_status:
  open: []
  investigating: [open]
  fixing: [investigating]
  verified: [fixing]
  closed: [verified]
  wontfix: [open, investigating]
allowed_link_roles: [fails_to_meet, exposed_by, addresses, derives_from]
directory: _specflow/work/defects/
