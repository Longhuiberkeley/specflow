type: decision
prefix: DEC
id_format: "DEC-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [review_status, priority, version, rationale, tags, suspect, fingerprint, links, upstream, checklists_applied, modified, context, options, resolution]
allowed_status:
  draft: []
  approved: [draft]
  superseded: [approved]
allowed_review_status: [unreviewed, reviewed, flagged, addressed, accepted, stale]
allowed_link_roles: [derives_from, addresses]
directory: _specflow/work/decisions/
