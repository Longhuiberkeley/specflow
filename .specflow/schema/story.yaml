type: story
prefix: STORY
id_format: "STORY-\\d{3}(\\.\\d{1,3})?$"
required_fields: [id, title, type, status, created]
optional_fields: [priority, version, rationale, tags, suspect, fingerprint, links, upstream, checklists_applied, modified]
allowed_status:
  draft: []
  approved: [draft]
  implemented: [approved]
  verified: [implemented]
allowed_link_roles: [implements, guided_by, specified_by, derives_from]
directory: _specflow/work/stories/
